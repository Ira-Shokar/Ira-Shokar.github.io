<body onload=brython()>
    <script type="text/python">
        from browser import document, alert
        def greet(event)
            i=1
            alert("Hello " + document["name-box-{}".format(i)].value + "!")
        document["greet-button"].bind("click", greet)
    </script>

    <input id="name-box-1" placeholder="Enter option 1">
    <input id="name-box-2" placeholder="Enter option 2">
    <button id="greet-button">Generate Random Choice</button>
