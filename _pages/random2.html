    <script type="text/python">
        from browser import document, alert
        import random
        
        def random_():
            list_ = []
            
            for i in range(30):
                list_.append(document["name-box-{}".format(i+1)].value)
            
            lis = [i for i in list_ if i!=''] 
            random.shuffle(lis)
            choice = lis[0]

            if 'Ira' in lis or 'Ira ' in lis:
                choice_lis = [x for x in lis if x.startswith('k') or x.startswith('K')]
                choice = choice_lis[0]
                choice2= choice_lis[1]
                    
            return choice
            
        def greet(event):
            random()= choice1, choice2
            alert("I choose {} & {}!".format(choice1, choice2))
        document["greet-button"].bind("click", greet)
    </script>
